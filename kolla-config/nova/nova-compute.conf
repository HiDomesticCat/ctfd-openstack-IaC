# Nova Compute 自訂設定
# 由 Kolla-Ansible 部署至 /etc/kolla/config/nova/nova-compute.conf
#
# 套用方式：make kolla-reconfigure-nova
# 參考：https://docs.openstack.org/kolla-ansible/latest/reference/compute/nova-guide.html

[DEFAULT]
# 記憶體 overcommit ratio（預設 1.0 = 不超額）
# 研究/測試環境設 1.5，讓 scheduler 允許分配超過物理 RAM 的記憶體
# Challenge VM 實際使用量遠低於分配量，1.5x 安全無虞
#
# 壓力測試 (2026-03-15) 確認：
#   ratio=1.0 → concurrency 10 只有 6/10 成功（記憶體不足）
#   ratio=1.5 → concurrency 10 全部 10/10 成功
ram_allocation_ratio = 1.5
