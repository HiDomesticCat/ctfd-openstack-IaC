# roles/k3s/tasks/main.yml
# k3s 叢集驗證與 chall-manager 整合設定
#
# 此 role 執行於 k3s_master 主機，並透過 delegate_to 將 kubeconfig
# 部署到 CTFd 伺服器，讓 chall-manager 可以連接 k3s API

# ── 等待 k3s API 就緒 ─────────────────────────────────────
- name: 等待 k3s API Server 可連線（最多 10 分鐘）
  wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    timeout: 600
    state: started

# ── Zombie node cleanup ───────────────────────────────────
# tofu force-replace worker 時，新 worker 用 --with-node-id hash 後綴註冊，
# 舊 hash 名的 Node object 會留下變 NotReady。這 task 在等 Ready 之前先砍掉，
# 避免下方 wait-all-Ready 卡在 zombie 上、且讓 kubectl get nodes 乾淨。
- name: 識別 zombie node（NotReady AND age > k3s_zombie_node_max_age_seconds）
  shell: |
    set -euo pipefail
    kubectl get nodes -o json | jq -r --argjson maxage {{ k3s_zombie_node_max_age_seconds }} '
      .items[]
      | select(any(.status.conditions[]; .type=="Ready" and .status!="True"))
      | select((.metadata.creationTimestamp | fromdateiso8601) < (now - $maxage))
      | .metadata.name
    '
  args:
    executable: /bin/bash    # dash 不支援 set -o pipefail
  register: zombie_nodes
  changed_when: false

- name: 砍掉 zombie node
  shell: kubectl delete node {{ item }}
  loop: "{{ zombie_nodes.stdout_lines }}"
  when: zombie_nodes.stdout_lines | length > 0

- name: 等待所有節點進入 Ready 狀態
  shell: |
    NOT_READY=$(kubectl get nodes --no-headers 2>/dev/null \
      | awk '{print $2}' | grep -v "Ready" | wc -l)
    echo "$NOT_READY"
  register: not_ready_count
  retries: 24
  delay: 15
  until: not_ready_count.stdout | trim == "0"
  changed_when: false

- name: 顯示 k3s 叢集節點狀態
  shell: kubectl get nodes -o wide
  register: nodes_status
  changed_when: false

- name: 顯示節點列表
  debug:
    msg: "{{ nodes_status.stdout_lines }}"

# ── 取得 kubeconfig ───────────────────────────────────────
- name: 從 master 取得 kubeconfig
  fetch:
    src: /home/ubuntu/.kube/config
    dest: "{{ playbook_dir }}/k3s-kubeconfig"
    flat: yes
  # kubeconfig 已由 cloud-init 替換為外部 floating IP

# ── 在 CTFd 伺服器設定 kubeconfig ─────────────────────────
# 讓 chall-manager Docker 容器可存取 k3s API
- name: 在 CTFd 伺服器建立 kubeconfig 目錄
  file:
    path: "{{ k3s_chall_manager_kubeconfig_dir }}"
    state: directory
    mode: "0700"
    owner: ubuntu
    group: ubuntu
  delegate_to: "{{ groups['ctfd'][0] }}"
  run_once: true

- name: 將 kubeconfig 部署到 CTFd 伺服器
  copy:
    src: "{{ playbook_dir }}/k3s-kubeconfig"
    dest: "{{ k3s_chall_manager_kubeconfig_dir }}/k3s.yaml"
    mode: "0600"
    owner: ubuntu
    group: ubuntu
  delegate_to: "{{ groups['ctfd'][0] }}"
  run_once: true

# ── 建立 challenge 專用 namespace ─────────────────────────
- name: 建立 challenges namespace（隔離 challenge pods）
  shell: |
    kubectl create namespace {{ k3s_challenges_namespace }} \
      --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false

- name: 為 challenges namespace 設定 ResourceQuota
  shell: |
    kubectl apply -f - <<'YAML'
    apiVersion: v1
    kind: ResourceQuota
    metadata:
      name: challenge-quota
      namespace: {{ k3s_challenges_namespace }}
    spec:
      hard:
        pods: "{{ k3s_max_challenge_pods }}"
        requests.cpu: "{{ k3s_challenge_cpu_request_total }}"
        requests.memory: "{{ k3s_challenge_memory_request_total }}"
        limits.cpu: "{{ k3s_challenge_cpu_limit_total }}"
        limits.memory: "{{ k3s_challenge_memory_limit_total }}"
    YAML
  changed_when: false

# ── Cinder CSI driver（OpenStack 動態 PV）────────────────
# 監控研究（Prometheus / OpenObserve）需要 PV 在 worker rebuild 時存活。
# k3s 預設 local-path-provisioner 的 PV 綁本機 disk，worker 重建即丟。
# Cinder CSI 從 OpenStack Cinder 動態 provision，重建後 PV 重新 mount。

- name: 渲染 cloud.conf（Cinder CSI 用的 OpenStack 認證）
  template:
    src: cloud.conf.j2
    dest: /tmp/cinder-csi-cloud.conf
    mode: "0600"
  changed_when: false

- name: 確保 kube-system/cloud-config secret 同步（Cinder CSI 用）
  shell: |
    kubectl -n kube-system create secret generic cloud-config \
      --from-file=cloud.conf=/tmp/cinder-csi-cloud.conf \
      --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false

- name: 移除暫存的 cloud.conf
  file:
    path: /tmp/cinder-csi-cloud.conf
    state: absent

- name: 部署 Cinder CSI HelmChart 到 k3s manifests 目錄
  template:
    src: cinder-csi-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/cinder-csi.yaml
    mode: "0644"
    owner: root
    group: root
  become: yes
  register: cinder_csi_manifest

- name: 等待 Cinder CSI controller pods 就緒
  shell: |
    kubectl -n kube-system get pods -l app=openstack-cinder-csi --no-headers 2>/dev/null \
      | awk '$3!="Running" || $2!~/^[0-9]+\/[0-9]+$/ { print }' | wc -l
  register: csi_not_ready
  retries: 60
  delay: 10
  until: csi_not_ready.stdout | trim == "0"
  changed_when: false

# 取消 k3s 內建 local-path StorageClass 的 default 標記（兩個 default 會無法決定優先）
- name: 取消 local-path StorageClass 的 default 註記
  shell: |
    kubectl patch storageclass local-path -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
  register: localpath_patch
  changed_when: '"patched" in localpath_patch.stdout'
  failed_when: localpath_patch.rc != 0 and "not found" not in localpath_patch.stderr

- name: 確認至少一個 cinder StorageClass 被標記為 default
  shell: |
    kubectl get storageclass -o json \
      | jq -r '[.items[] | select(.provisioner=="cinder.csi.openstack.org" and .metadata.annotations["storageclass.kubernetes.io/is-default-class"]=="true") | .metadata.name] | length'
  register: cinder_default_count
  changed_when: false
  failed_when: (cinder_default_count.stdout | trim | int) < 1

# ── Pre-pull challenge images（加速首次啟動）───────────────
# 在 k3s 節點預先拉取題目 image，搭配 ImagePullPolicy: IfNotPresent
# 使 chall-manager 建立 Pod 時無需等待 pull
- name: Pre-pull challenge container images
  command: "k3s crictl pull {{ item }}"
  loop: "{{ k3s_challenge_prepull_images | default([]) }}"
  when: k3s_challenge_prepull_images | default([]) | length > 0
  changed_when: false
  ignore_errors: true  # 某些 image 可能尚不存在（賽前準備中）

# ── 確認 chall-manager 重新載入（kubeconfig 已更新）─────────
- name: 通知 CTFd 伺服器重啟 chall-manager（讀取新 kubeconfig）
  community.docker.docker_compose_v2:
    project_src: "{{ chall_manager_dir }}"
    services:
      - chall-manager
    state: present
    recreate: always
  delegate_to: "{{ groups['ctfd'][0] }}"
  run_once: true

# ── 顯示完成資訊 ───────────────────────────────────────────
- name: 顯示完成資訊
  debug:
    msg:
      - "✅ k3s 叢集已就緒"
      - "   kubectl API     : https://{{ ansible_host }}:6443"
      - "   kubeconfig      : {{ k3s_chall_manager_kubeconfig_dir }}/k3s.yaml（CTFd 伺服器）"
      - "   challenges ns   : {{ k3s_challenges_namespace }}"
      - "   chall-manager 已重啟並載入新 kubeconfig"
  run_once: true
