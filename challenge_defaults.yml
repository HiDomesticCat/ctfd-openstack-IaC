# 運維管理的基礎設施預設值
# registration script 會將這些值合併到每道題目的 additional 中
# 題目的 challenge.yml 中的 additional 會覆蓋這裡的值

# ── scenario 預設名稱（展開為 registry:5000/<scenario>:latest）──
scenario_registry: "registry:5000"
scenario_tag: "latest"

# ── openstack-vm 預設值 ─────────────────────────────────────
openstack-vm:
  network_id: "3209808a-07ac-4584-ac74-d4e70e55c46a"  # shared-public2
  flavor: "basic-1c2g"
  fip_pool: "public3"
  use_fip: "false"
  flag_prefix: "CTF"
  flag_path: "/opt/ctf/flag.txt"
  security_group_id: "3534e369-e6e3-4644-a889-b46c77f3944e"  # ctf-allow-all
  boot_from_volume: "true"
  volume_size: "10"

# ── k8s-pod 預設值 ──────────────────────────────────────────
k8s-pod:
  flag_prefix: "CTF"
  # cpu: "100m"
  # memory: "128Mi"
