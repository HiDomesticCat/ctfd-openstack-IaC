# 運維管理的基礎設施預設值
# registration script 會將這些值合併到每道題目的 additional 中
# 題目的 challenge.yml 中的 additional 會覆蓋這裡的值

# ── scenario 預設名稱（展開為 registry:5000/<scenario>:latest）──
scenario_registry: "registry:5000"
scenario_tag: "latest"

# ── openstack-vm 預設值 ─────────────────────────────────────
# ⚠️ network_id 和 security_group_id 為部署後產生的 UUID，必須從 tofu output 更新：
#   cd ctfd && tofu output network_id
#   cd ctfd && tofu output challenge_secgroup_ids
openstack-vm:
  network_id: "REPLACE_FROM_TOFU_OUTPUT"          # ctfd tofu output: network_id
  flavor: "general.small"
  fip_pool: "public"
  use_fip: "false"
  flag_prefix: "CTF"
  flag_path: "/opt/ctf/flag.txt"
  security_group_id: "REPLACE_FROM_TOFU_OUTPUT"   # ctfd tofu output: challenge_secgroup_ids.allow_all
  boot_from_volume: "false"
  volume_size: "10"

# ── k8s-pod 預設值 ──────────────────────────────────────────
k8s-pod:
  flag_prefix: "CTF"
  # cpu: "100m"
  # memory: "128Mi"
